<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexiFit - Adil Memmedov</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>FlexiFit'e Hoş Geldin</h1>
            <p>Sisteme giriş yap veya yeni kayıt oluştur.</p>
        </div>

        <div class="form-wrapper">
            
            <div class="form-box">
                <h2>Kayıt Ol</h2>
                <form id="registerForm">
                    <input type="text" id="regName" placeholder="Ad Soyad" required>
                    <input type="email" id="regEmail" placeholder="E-posta Adresi" required>
                    <input type="password" id="regPassword" placeholder="Şifre" required>
                    <input type="number" id="regHeight" placeholder="Boy (cm)" required>
                    <input type="number" id="regWeight" placeholder="Kilo (kg)" required>
                    <button type="submit">Kayıt Ol</button>
                </form>
                <div id="regMessage" class="message"></div>
            </div>

            <div class="form-box">
                <h2>Giriş Yap</h2>
                <form id="loginForm">
                    <input type="email" id="loginEmail" placeholder="E-posta Adresi" required>
                    <input type="password" id="loginPassword" placeholder="Şifre" required>
                    <button type="submit">Giriş Yap</button>
                </form>
                <div id="loginMessage" class="message"></div>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
